# Superpower Wardrobe — 服务器部署
# 使用方法: docker compose up -d
#
# 需要先复制 .env.example 为 .env 并填写配置：
#   cp .env.example .env
#   vim .env
#   docker compose up -d

version: "3.9"

services:
  # ── FashionCLIP AI识别服务 ────────────────────────────────────
  fashion-clip:
    build:
      context: ./services/fashion-clip
      dockerfile: Dockerfile
    container_name: wardrobe-fashion-clip
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    # 挂载模型缓存，避免每次重启重新下载
    volumes:
      - model-cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 4g          # CLIP 模型约需 2-3 GB
    deploy:
      resources:
        limits:
          memory: 4G

  # ── Web Demo（静态页面）via Nginx ─────────────────────────────
  web-demo:
    image: nginx:alpine
    container_name: wardrobe-web-demo
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"       # 如果配置了 SSL 证书
    volumes:
      - ./web-demo:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # 如有 SSL 证书，取消注释：
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      fashion-clip:
        condition: service_healthy

volumes:
  model-cache:
    name: wardrobe-model-cache
