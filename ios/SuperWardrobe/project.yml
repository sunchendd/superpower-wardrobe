name: SuperWardrobe
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.9
    PRODUCT_BUNDLE_IDENTIFIER: com.sunchendong.superwardrobe
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  SuperWardrobeApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SuperWardrobe
        excludes:
          - Services/FashionCLIPService.swift
          - Services/PurchaseService.swift
          - Services/SupabaseService.swift
          - ViewModels/AuthViewModel.swift
          - ViewModels/ProfileViewModel.swift
          - Views/Wardrobe/ClothingItemDetailView.swift
    settings:
      base:
        PRODUCT_NAME: SuperWardrobe
        INFOPLIST_KEY_CFBundleDisplayName: SuperWardrobe
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSCameraUsageDescription: 拍摄衣物照片以添加到衣橱。
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: 从相册选择衣物照片以添加到衣橱。
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: 获取当前位置天气以生成每日穿搭推荐。
        INFOPLIST_KEY_NSSupportsLiveActivities: false
        GENERATE_INFOPLIST_FILE: YES
    scheme:
      testTargets:
        - SuperWardrobeTests

  SuperWardrobeTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/SuperWardrobeTests
    dependencies:
      - target: SuperWardrobeApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
